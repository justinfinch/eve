# process-compose.yaml — starter for devbox services without a built-in plugin.
#
# Devbox runs `devbox services up` against this file (merged with any plugin-provided
# entries). Add one block per daemon. Set `working_dir` under .devbox/virtenv/<name>
# so state stays repo-local and gets wiped with `devbox services rm`.
#
# Example: rabbitmq-server (no built-in plugin as of devbox 0.13)

version: "0.5"

processes:
  rabbitmq:
    command: rabbitmq-server
    working_dir: .devbox/virtenv/rabbitmq
    environment:
      - RABBITMQ_NODE_PORT=5673          # +1 from default 5672
      - RABBITMQ_MNESIA_BASE=.devbox/virtenv/rabbitmq/mnesia
      - RABBITMQ_LOG_BASE=.devbox/virtenv/rabbitmq/log
    readiness_probe:
      exec:
        command: rabbitmq-diagnostics -q ping
      initial_delay_seconds: 5
      period_seconds: 5
    availability:
      restart: on_failure

